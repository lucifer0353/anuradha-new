workflows:
  android-release:
    name: Anuradha Machinery Stores - Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Extract project ZIP
        script: |
          cd $CM_BUILD_DIR
          unzip -q anuradha_machinery_stores_FIXED.zip
          cp -r anuradha_fixed/. .
          rm -rf anuradha_fixed
          ls -la
      - name: Fix package versions
        script: |
          cd $CM_BUILD_DIR
          sed -i 's/open_filex: \^1.3.6/open_filex: ^4.7.0/' pubspec.yaml
          sed -i 's/permission_handler: \^11.3.1/permission_handler: ^11.3.1/' pubspec.yaml
          cat pubspec.yaml | grep open_filex
      - name: Get Flutter packages
        script: |
          cd $CM_BUILD_DIR
          flutter pub get
      - name: Build Android APK
        script: |
          cd $CM_BUILD_DIR
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - djdpk0353@gmail.com
        notify:
          success: true
          failure: true